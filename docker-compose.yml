version: '3.9'

services:
  minio:
    image: minio/minio:latest
    container_name: mercato-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio-data:/data

  seq:
    image: datalust/seq:latest
    container_name: mercato-seq
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: "Admin123!"
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data

  redis:
    image: redis:7.4
    container_name: mercato-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: always

  redisinsight:
    image: redis/redisinsight:latest
    container_name: mercato-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight-data:/data
    restart: always

volumes:
  minio-data:
  seq-data:
  redis-data:
  redisinsight-data: